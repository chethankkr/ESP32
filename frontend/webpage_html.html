<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ESP32-CAM Robot Controller</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    /* Base styles */
    body {
      background-color: #0a0c0f;
      background-image: 
        linear-gradient(45deg, rgba(34, 34, 34, 0.2) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(34, 34, 34, 0.2) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(34, 34, 34, 0.2) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(34, 34, 34, 0.2) 75%);
      background-size: 20px 20px;
      color: #5fff87;
      font-family: 'Courier New', monospace;
      padding: 20px;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: clamp(24px, 4vw, 32px);
      text-align: center;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #5fff87;
      text-shadow: 0 0 10px rgba(95, 255, 135, 0.5);
    }

    .top-section {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    #stream-box, #map {
      border: 2px solid #5fff87;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      height: 300px;
      position: relative;
      background-color: rgba(10, 12, 15, 0.8);
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.2);
    }

    #stream {
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }

    #status-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      position: absolute;
      top: 5px;
      left: 5px;
      background-color: red;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    .stream-btn-group {
      position: absolute;
      left: 10px;
      bottom: 10px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    #save-btn,
    #flash-btn {
      position: static;
      margin: 0;
    }

    #flash-btn {
      width: 45px;
      height: 45px;
      background-color: rgba(10, 12, 15, 0.9);
      color: #5fff87;
      font-size: 20px;
      padding: 0;
      border-radius: 8px;
      border: 2px solid #5fff87;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #flash-btn.active {
      background-color: rgba(95, 255, 135, 0.2);
      color: #5fff87;
      border-color: #5fff87;
    }

    #flash-btn:hover {
      background-color: rgba(95, 255, 135, 0.2);
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.3);
      transform: scale(1.05);
    }

    #flash-btn:active {
      transform: scale(0.95);
      background-color: rgba(95, 255, 135, 0.3);
    }

    #toggle-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background-color: rgba(10, 12, 15, 0.9);
      color: #5fff87;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 2px solid #5fff87;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      width: 45px;
      height: 45px;
    }

    #toggle-btn i {
      font-size: 20px;
    }

    #toggle-btn.playing {
      background-color: rgba(95, 255, 135, 0.2);
    }

    #toggle-btn:hover {
      background-color: rgba(95, 255, 135, 0.2);
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.3);
      transform: scale(1.05);
    }

    #toggle-btn:active {
      transform: scale(0.95);
      background-color: rgba(95, 255, 135, 0.3);
    }

    #save-btn {
      width: 45px;
      height: 45px;
      background-color: rgba(10, 12, 15, 0.9);
      color: #5fff87;
      font-size: 20px;
      padding: 0;
      border-radius: 8px;
      border: 2px solid #5fff87;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #save-btn:hover {
      background-color: rgba(95, 255, 135, 0.2);
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.3);
      transform: scale(1.05);
    }

    #save-btn:active {
      transform: scale(0.95);
      background-color: rgba(95, 255, 135, 0.3);
    }

    #save-btn i {
      margin-right: 4px;
    }

    @media (max-width: 768px) {
      #save-btn,
      #toggle-btn,
      #flash-btn {
        font-size: 14px;
        padding: 6px 10px;
      }
    }

    .movemnet-buttons {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 65px);
      gap: 10px;
      background: rgba(10, 12, 15, 0.9);
      padding: 15px;
      border-radius: 15px;
      border: 2px solid #5fff87;
      position: relative;
    }

    .movemnet-buttons::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 15px;
      background: linear-gradient(45deg, 
        transparent 0%, 
        rgba(95, 255, 135, 0.1) 25%, 
        rgba(95, 255, 135, 0.1) 75%, 
        transparent 100%);
      z-index: -1;
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .movement-btn {
      width: 65px;
      height: 65px;
      background-color: rgba(10, 12, 15, 0.9);
      border: 2px solid #5fff87;
      color: #5fff87;
      border-radius: 12px;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .movement-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(95, 255, 135, 0.2),
        transparent
      );
      transition: 0.5s;
    }

    .movement-btn:hover::before {
      left: 100%;
    }

    .movement-btn:hover {
      background-color: rgba(95, 255, 135, 0.2);
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.3);
      transform: scale(1.05);
    }

    .movement-btn:active {
      transform: scale(0.95);
      background-color: rgba(95, 255, 135, 0.3);
    }

    .movement-btn.center {
      background: radial-gradient(circle at center, 
        rgba(95, 255, 135, 0.2) 0%, 
        rgba(10, 12, 15, 0.9) 70%);
    }

    .empty-cell {
      width: 65px;
      height: 65px;
    }

    .bottom-section {
      display: flex;
      justify-content: space-between;
    }

    #gps-data {
      background-color: rgba(10, 12, 15, 0.95);
      color: #5fff87;
      border: 2px solid #5fff87;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      border-radius: 10px;
      width: 220px;
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.2);
      position: relative;
      overflow: hidden;
    }

    #gps-data::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 25px;
      background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(95, 255, 135, 0.1) 25%, 
        rgba(95, 255, 135, 0.1) 75%, 
        transparent 100%);
      animation: scan 2s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateY(-25px); }
      100% { transform: translateY(220px); }
    }

    #gps-data strong {
      display: block;
      text-align: center;
      font-size: 16px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid #5fff87;
      padding-bottom: 5px;
      text-shadow: 0 0 10px rgba(95, 255, 135, 0.5);
    }

    .gps-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
      padding: 4px;
      border: 1px solid rgba(95, 255, 135, 0.3);
      border-radius: 4px;
      background: rgba(95, 255, 135, 0.05);
    }

    .gps-label {
      font-weight: bold;
      color: #5fff87;
    }

    .gps-value {
      font-family: 'Courier New', monospace;
      color: #5fff87;
      text-shadow: 0 0 5px rgba(95, 255, 135, 0.5);
      background: rgba(10, 12, 15, 0.8);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid rgba(95, 255, 135, 0.3);
    }

    /* Camera Controls Styling */
    .camera-controls {
      flex: 0 0 auto;
      width: 200px;
      height: 200px;
      border: 2px solid #5fff87;
      border-radius: 50%;
      position: relative;
      background: rgba(10, 12, 15, 0.9);
      padding: 10px;
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.2);
    }

    .camera-controls::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 50%;
      background: linear-gradient(45deg, 
        transparent 0%, 
        rgba(95, 255, 135, 0.1) 25%, 
        rgba(95, 255, 135, 0.1) 75%, 
        transparent 100%);
      z-index: -1;
      animation: glowPulse 2s ease-in-out infinite;
    }

    .cam-btn {
      background-color: rgba(10, 12, 15, 0.9);
      border: 2px solid #5fff87;
      color: #5fff87;
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .cam-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(95, 255, 135, 0.2),
        transparent
      );
      transition: 0.5s;
    }

    .cam-btn:hover::before {
      left: 100%;
    }

    .cam-btn:hover {
      background-color: rgba(95, 255, 135, 0.2);
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.3);
      transform: scale(1.05);
    }

    .cam-btn:active {
      transform: scale(0.95);
      background-color: rgba(95, 255, 135, 0.3);
    }

    .cam-btn.up {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
    }

    .cam-btn.down {
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
    }

    .cam-btn.left {
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    .cam-btn.right {
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    .cam-btn.center {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center, 
        rgba(95, 255, 135, 0.2) 0%, 
        rgba(10, 12, 15, 0.9) 70%);
    }

    .controls-container {
      border: 2px solid #5fff87;
      border-radius: 10px;
      margin: 20px auto;
      padding: 20px;
      width: 95%;
      max-width: 1200px;
      position: relative;
      min-height: 250px;
      background-color: rgba(10, 12, 15, 0.8);
      box-shadow: 0 0 15px rgba(95, 255, 135, 0.2);
    }

    .controls-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    #gps-data {
      flex: 1;
      min-width: 250px;
      max-width: 300px;
      margin: 0 auto;
    }

    .camera-controls {
      margin: 0 auto;
    }

    .movemnet-buttons {
      margin: 0 auto;
    }

    .speed-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 350px;
      width: 180px;
      background: rgba(10, 12, 15, 0.95);
      border: 3px solid #5fff87;
      border-radius: 40px;
      box-shadow: 0 0 30px 0 rgba(95, 255, 135, 0.15), 0 0 0 8px rgba(95,255,135,0.05) inset;
      margin-left: 40px;
      padding: 0 0 30px 0;
      position: relative;
      overflow: hidden;
    }

    .speed-label {
      color: #5fff87;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      text-shadow: 0 0 8px #5fff87, 0 0 2px #5fff87;
      letter-spacing: 2px;
      margin-top: 24px;
      margin-bottom: 24px;
      text-align: center;
      width: 100%;
    }

    .slider-outer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      position: relative;
    }

    .speed-slider {
      width: 220px;
      height: 48px;
      display: block;
      -webkit-appearance: none;
      background: transparent;
      transform: rotate(-90deg);
      position: relative;
      z-index: 2;
      margin: 0;
      padding: 0;
    }

    .speed-slider::-webkit-slider-runnable-track {
      width: 100%;
      height: 28px;
      background: linear-gradient(to right, rgba(95,255,135,0.15) 0%, #5fff87 50%, rgba(95,255,135,0.15) 100%);
      border: 2px solid #5fff87;
      border-radius: 16px;
      box-shadow: 0 0 20px #5fff87, 0 0 8px #5fff87 inset;
    }

    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 38px;
      width: 38px;
      border-radius: 50%;
      background: radial-gradient(circle at 60% 40%, #baffc9 70%, #5fff87 100%);
      border: 2px solid #5fff87;
      box-shadow: 0 0 30px #5fff87, 0 0 10px #5fff87 inset;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: -5px;
    }

    .speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px #5fff87, 0 0 20px #5fff87 inset;
    }

    .speed-slider:focus {
      outline: none;
    }

    .speed-value {
      color: #5fff87;
      font-family: 'Courier New', monospace;
      font-size: 28px;
      text-shadow: 0 0 10px #5fff87, 0 0 2px #5fff87;
      letter-spacing: 2px;
      text-align: center;
      background: none;
      margin-top: 18px;
      margin-bottom: 0;
      transition: all 0.3s;
    }

    .speed-value.changed {
      transform: scale(1.15);
      text-shadow: 0 0 20px #5fff87, 0 0 8px #5fff87;
    }

    @media (max-width: 768px) {
      .speed-control {
        height: 220px;
        width: 110px;
        border-radius: 25px;
        margin-left: 10px;
        padding: 0 0 18px 0;
      }
      .speed-label {
        font-size: 16px;
        margin-top: 12px;
        margin-bottom: 12px;
      }
      .slider-outer {
        min-height: 100px;
      }
      .speed-slider {
        width: 110px;
        height: 38px;
      }
      .speed-value {
        font-size: 18px;
        margin-top: 10px;
      }
    }

    /* Tablet Breakpoint */
    @media (max-width: 1024px) {
      body {
        padding: 15px;
      }

      .controls-section {
        justify-content: center;
        gap: 30px;
      }

      #gps-data {
        order: -1;
        width: 100%;
        max-width: 400px;
      }

      .camera-controls {
        order: 1;
      }

      .movemnet-buttons {
        order: 2;
      }
    }

    /* Mobile Breakpoint */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .controls-container {
        padding: 15px;
        margin: 10px auto;
      }

      #stream-box, #map {
        height: 250px;
      }

      .camera-controls {
        width: 180px;
        height: 180px;
      }

      .cam-btn {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }

      .movemnet-buttons {
        grid-template-columns: repeat(3, 55px);
        gap: 8px;
      }

      .movement-btn {
        width: 55px;
        height: 55px;
        font-size: 20px;
      }

      .gps-row {
        font-size: 12px;
      }

      .motion-status-label, .metal-status-label {
        font-size: 12px;
      }

      .motion-status-value, .metal-status-value {
        font-size: medium;
      }
    }

    /* Small Mobile Breakpoint */
    @media (max-width: 480px) {
      h1 {
        font-size: 20px;
        margin-bottom: 15px;
      }

      #stream-box, #map {
        height: 200px;
      }

      .controls-container {
        padding: 10px;
      }

      .camera-controls {
        width: 150px;
        height: 150px;
      }

      .cam-btn {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }

      .movemnet-buttons {
        grid-template-columns: repeat(3, 45px);
        gap: 6px;
      }

      .movement-btn {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }
    }

    .motion-status, .metal-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(95, 255, 135, 0.3);
    }

    .motion-status-label, .metal-status-label {
      font-size: 14px;
      color: #5fff87;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .motion-status-value, .metal-status-value {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: medium;
      font-weight: 400;
      text-transform: uppercase;
      background: transparent;
      border: none;
      transition: all 0.3s ease;
      color: #5fff87;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(95, 255, 135, 0.2);
    }

    .motion-status-value.active, .metal-status-value.active {
      background: rgba(255, 0, 0, 0.2);
      color: #ff0000;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
      border-color: #ff0000;
      animation: pulseDanger 2s infinite;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .metal-status-value i {
      margin-right: 5px;
    }

    @keyframes pulseDanger {
      0% { 
        box-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
      }
      50% { 
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        text-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
      }
      100% { 
        box-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
      }
    }

    @keyframes staticNoise {
      0% { background-position: 0 0; }
      100% { background-position: 100% 100%; }
    }

    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }

    .crt-static {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(
          0deg,
          rgba(95, 255, 135, 0.1) 50%,
          rgba(0, 0, 0, 0.3) 50%
        ),
        repeating-radial-gradient(
          circle at 50% 50%,
          rgba(95, 255, 135, 0.1) 0%,
          rgba(95, 255, 135, 0.1) 3px,
          rgba(0, 0, 0, 0.3) 4px,
          rgba(0, 0, 0, 0.3) 5px
        );
      background-size: 100% 4px, 8px 8px;
      border-radius: 10px;
      animation: staticNoise 0.1s steps(4) infinite;
      display: none;
      z-index: 1;
      mix-blend-mode: screen;
    }

    .crt-static::before {
      content: 'NO SIGNAL';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #5fff87;
      font-family: 'Courier New', monospace;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 
        0 0 5px #5fff87,
        0 0 10px #5fff87,
        0 0 20px #5fff87;
      z-index: 2;
      animation: textFlicker 2s linear infinite;
    }

    @keyframes textFlicker {
      0% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.3; }
      94% { opacity: 1; }
      95% { opacity: 0.3; }
      96% { opacity: 1; }
      97% { opacity: 0.3; }
      98% { opacity: 1; }
      99% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .crt-static::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(
          rgba(95, 255, 135, 0.1) 50%,
          rgba(0, 0, 0, 0.2) 50%
        ),
        linear-gradient(
          90deg,
          rgba(95, 255, 135, 0.06),
          rgba(95, 255, 135, 0.02),
          rgba(95, 255, 135, 0.06)
        );
      background-size: 100% 4px, 100% 100%;
      animation: scanline 8s linear infinite;
      opacity: 1;
      z-index: 1;
      pointer-events: none;
    }

    #stream-box {
      position: relative;
      overflow: hidden;
      background-color: #000;
    }
  </style>
</head>

<body>
  <h1>ESP32-CAM Robot Controller</h1>

  <div class="top-section">
    <div id="stream-box">
      <div class="crt-static"></div>
      <div id="status-dot"></div>
      <img id="stream" alt="stream">
      <div class="stream-btn-group">
        <button id="save-btn" onclick="captureImage()" title="Save Image">
          <i class="fas fa-download"></i>
        </button>
        <button id="flash-btn" onclick="toggleFlash()" title="Toggle Flash">
          <i class="fas fa-bolt"></i>
        </button>
      </div>
      <button id="toggle-btn" onclick="toggleStream()" title="Toggle Stream">
        <i class="fas fa-play"></i>
      </button>
    </div>

    <div id="map"></div>
  </div>


  <div class="controls-container">
    <div class="controls-section">
      <div id="gps-data">
        <strong>GPS Data</strong>
        <div class="gps-row">
          <span class="gps-label">LAT:</span>
          <span class="gps-value" id="gps-lat">--</span>
        </div>
        <div class="gps-row">
          <span class="gps-label">LNG:</span>
          <span class="gps-value" id="gps-lng">--</span>
        </div>
        <div class="gps-row">
          <span class="gps-label">ALT:</span>
          <span class="gps-value"><span id="gps-alt">--</span> m</span>
        </div>
        <div class="gps-row">
          <span class="gps-label">SPD:</span>
          <span class="gps-value"><span id="gps-speed">--</span> km/h</span>
        </div>
        <div class="gps-row">
          <span class="gps-label">TIME:</span>
          <span class="gps-value" id="gps-time">--</span>
        </div>
        <div class="motion-status">
          <span class="metal-status-label">Motion:</span>
          <span class="metal-status-value" id="motion-section">NO MOTION</span>
        </div>
        <div class="metal-status">
          <span class="metal-status-label">Metal:</span>
          <span class="metal-status-value" id="metal-section">NO METAL</span>
        </div>
      </div>

      <!-- Camera Control D-Pad -->
      <div class="camera-controls">
        <button onclick="sendCamCommand('up')" class="cam-btn up">▲</button>
        <button onclick="sendCamCommand('left')" class="cam-btn left">◀</button>
        <button onclick="sendCamCommand('fire')" class="cam-btn center">●</button>
        <button onclick="sendCamCommand('right')" class="cam-btn right">▶</button>
        <button onclick="sendCamCommand('down')" class="cam-btn down">▼</button>
      </div>

      <div class="movemnet-buttons">
        <div class="empty-cell"></div>
        <button class="movement-btn" onclick="sendMoveCommand('F')">&#x2191;</button>
        <div class="empty-cell"></div>

        <button class="movement-btn" onclick="sendMoveCommand('L')">&#x2190;</button>
        <button class="movement-btn center" onclick="sendMoveCommand('S')">&#x23F9;</button>
        <button class="movement-btn" onclick="sendMoveCommand('R')">&#x2192;</button>

        <div class="empty-cell"></div>
        <button class="movement-btn" onclick="sendMoveCommand('B')">&#x2193;</button>
        <div class="empty-cell"></div>
      </div>

      <div class="speed-control">
        <div class="speed-label">SPEED</div>
        <div class="slider-outer">
          <input type="range" class="speed-slider" min="0" max="255" value="0" id="speedControl">
        </div>
        <span class="speed-value" id="speedValue">0%</span>
      </div>
    </div>
  </div>

  <script src="ESP.js"></script>
</body>

</html>
